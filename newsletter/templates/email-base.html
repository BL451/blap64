<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{title}}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #171717;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            color: #d0d0d0;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        table {
            border-spacing: 0;
            border-collapse: collapse;
        }

        img {
            border: 0;
            outline: none;
            text-decoration: none;
            -ms-interpolation-mode: bicubic;
        }

        a {
            color: #4a90e2;
            text-decoration: underline;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fafafa;
            margin: 0 0 16px;
            line-height: 1.2;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #fafafa;
            margin: 32px 0 12px;
            line-height: 1.3;
        }

        h3 {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
            margin: 24px 0 8px;
        }

        p {
            margin: 0 0 16px;
        }

        blockquote {
            border-left: 3px solid #4a90e2;
            margin: 20px 0;
            padding: 4px 0 4px 16px;
            color: #b0b0b0;
        }

        ul, ol {
            padding-left: 24px;
            margin: 0 0 16px;
        }

        li {
            margin-bottom: 6px;
        }

        hr {
            border: none;
            border-top: 1px solid #333;
            margin: 32px 0;
        }

        pre {
            background: #0d1117;
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 20px 0;
        }

        code {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 13px;
        }

        code:not(pre code) {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 3px;
            color: #e6edf3;
            font-size: 14px;
        }

        img:not(.header-icon) {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 20px 0;
        }

        .shiki {
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #171717;">
        <tr>
            <td align="center" style="padding: 24px 16px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%;">
                    <!-- Header -->
                    <tr>
                        <td style="padding: 0 0 20px; border-bottom: 1px solid #333;">
                            <a href="{{siteBaseUrl}}" style="color: #808080; text-decoration: none; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase;">BLAP64</a>
                            <span style="color: #808080;">&nbsp;/&nbsp;</span>
                            <a href="{{siteBaseUrl}}/newsletter/" style="color: #808080; text-decoration: none; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase;">Code Art Corner</a>
                        </td>
                    </tr>

                    <!-- Title -->
                    <tr>
                        <td style="padding: 32px 0 8px;">
                            <h1 style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 28px; font-weight: 700; color: #fafafa; margin: 0; line-height: 1.2;">{{title}}</h1>
                        </td>
                    </tr>

                    <!-- Date -->
                    <tr>
                        <td style="padding: 0 0 32px;">
                            <span style="color: #808080; font-size: 14px;">{{date}}</span>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="color: #d0d0d0; font-size: 16px; line-height: 1.7;">
                            {{content}}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 40px 0 0; border-top: 1px solid #333; margin-top: 40px;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="color: #606060; font-size: 13px; padding-top: 24px;">
                                        <p style="margin: 0 0 8px;">Code Art Corner by <a href="{{siteBaseUrl}}" style="color: #4a90e2; text-decoration: none;">Benjamin Lappalainen</a></p>
                                        <p style="margin: 0 0 8px;"><a href="{{archiveUrl}}" style="color: #4a90e2; text-decoration: none;">View in browser</a></p>
                                        <p style="margin: 0; color: #505050; font-size: 12px;">
                                            <a href="{{{RESEND_UNSUBSCRIBE_URL}}}" style="color: #505050; text-decoration: underline;">Unsubscribe</a>
                                        </p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
