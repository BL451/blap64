<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - Code Art Corner</title>
    <meta name="description" content="{{description}}">
    <meta name="theme-color" content="#171717">

    <meta property="og:title" content="{{title}} - Code Art Corner">
    <meta property="og:description" content="{{description}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{siteBaseUrl}}/newsletter/{{slug}}/">
    <meta property="og:image" content="{{heroImage}}">
    <meta property="og:site_name" content="BLAP64">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{title}}">
    <meta name="twitter:description" content="{{description}}">

    <link rel="canonical" href="{{siteBaseUrl}}/newsletter/{{slug}}/">

    <style>
        @font-face {
            font-family: "BPdotsSquareVF";
            src: url("/newsletter/fonts/BPdotsSquareVF.ttf") format('truetype');
            font-display: swap;
        }

        @font-face {
            font-family: "ZxGamut";
            src: url("/newsletter/fonts/ZxGamut-Variable.woff2") format('woff2');
            font-display: swap;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #171717;
            color: #e8e8e8;
            font-family: "ZxGamut", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        .newsletter-wrapper {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .newsletter-header {
            border-bottom: 1px solid #333;
            padding-bottom: 16px;
            margin-bottom: 40px;
        }

        .newsletter-header a {
            font-family: "BPdotsSquareVF", monospace;
            font-weight: 900;
            color: #808080;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .newsletter-header a:hover {
            color: #4a90e2;
        }

        .post-meta {
            margin-bottom: 32px;
        }

        .post-title {
            font-family: "BPdotsSquareVF", monospace;
            font-size: 36px;
            font-weight: 900;
            color: #fafafa;
            margin: 0 0 12px;
            line-height: 1.2;
        }

        .post-date {
            color: #808080;
            font-size: 14px;
        }

        .post-updated {
            display: block;
            color: #606060;
            font-size: 13px;
            margin-top: 4px;
            font-style: italic;
        }

        .post-tags {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .post-tag {
            font-family: "BPdotsSquareVF", monospace;
            font-weight: 900;
            font-size: 12px;
            color: #4a90e2;
            border: 1px solid rgba(74, 144, 230, 0.3);
            padding: 2px 10px;
            letter-spacing: 0.03em;
        }

        .post-content h1 {
            font-family: "BPdotsSquareVF", monospace;
            font-size: 28px;
            font-weight: 900;
            color: #fafafa;
            margin: 48px 0 16px;
            line-height: 1.3;
        }

        .post-content h2 {
            font-family: "BPdotsSquareVF", monospace;
            font-size: 22px;
            font-weight: 900;
            color: #fafafa;
            margin: 40px 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
            line-height: 1.3;
        }

        .post-content h3 {
            font-family: "BPdotsSquareVF", monospace;
            font-size: 18px;
            font-weight: 900;
            color: #e0e0e0;
            margin: 32px 0 8px;
        }

        .post-content p {
            margin: 0 0 20px;
            color: #d0d0d0;
        }

        .post-content a {
            color: #4a90e2;
            text-decoration: underline;
            text-decoration-color: rgba(74, 144, 230, 0.4);
            text-underline-offset: 2px;
        }

        .post-content a:visited {
            color: #f5be07;
            text-decoration-color: rgba(245, 190, 7, 0.4);
        }

        .post-content a:hover {
            color: #74a0e6;
            text-decoration-color: #74a0e6;
        }

        .post-content img {
            max-width: 100%;
            height: auto;
            border: 1px solid #333;
            margin: 24px 0;
            display: block;
        }

        .post-content blockquote {
            border-left: 3px solid #4a90e2;
            margin: 24px 0;
            padding: 4px 0 4px 20px;
            color: #b0b0b0;
        }

        .post-content blockquote p {
            color: #b0b0b0;
        }

        .post-content ul, .post-content ol {
            padding-left: 24px;
            margin: 0 0 20px;
            color: #d0d0d0;
        }

        .post-content li {
            margin-bottom: 8px;
        }

        .post-content hr {
            border: none;
            border-top: 1px solid #333;
            margin: 40px 0;
        }

        .post-content pre {
            margin: 24px 0;
            border-radius: 4px;
            overflow-x: auto;
        }

        .post-content .shiki {
            padding: 20px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.5;
        }

        .post-content code:not(pre code) {
            font-family: 'SF Mono', Monaco, 'Cascadia Code', Consolas, 'Courier New', monospace;
            font-size: 0.9em;
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 3px;
            color: #e6edf3;
        }

        .video-embed {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin: 24px 0;
            overflow: hidden;
        }

        .video-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid #333;
        }

        .video-fallback {
            display: none;
        }

        .sketch-embed {
            margin: 24px 0;
        }

        .sketch-embed iframe {
            display: block;
            max-width: 100%;
        }

        .sketch-caption {
            font-family: "BPdotsSquareVF", monospace;
            font-weight: 900;
            font-size: 13px;
            color: #808080;
            margin: 8px 0 0;
            text-align: center;
        }

        .newsletter-footer {
            font-family: "BPdotsSquareVF", monospace;
            font-weight: 900;
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid #333;
            color: #606060;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .newsletter-footer a {
            color: #4a90e2;
            text-decoration: none;
        }

        .newsletter-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .newsletter-wrapper {
                padding: 24px 16px 60px;
            }

            .post-title {
                font-size: 28px;
            }

            .post-content .shiki {
                font-size: 13px;
                padding: 16px;
            }

            .newsletter-footer {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="newsletter-wrapper">
        <nav class="newsletter-header">
            <a href="{{siteBaseUrl}}">BLAP64</a>
            &nbsp;/&nbsp;
            <a href="{{siteBaseUrl}}/newsletter/">Code Art Corner</a>
        </nav>

        <div class="post-meta">
            <h1 class="post-title">{{title}}</h1>
            <time class="post-date" datetime="{{rawDate}}">{{date}}</time>
            {{updatedLine}}
            <div class="post-tags">{{tags}}</div>
        </div>

        <div class="post-content">
            {{content}}
        </div>

        <footer class="newsletter-footer">
            <span>Code Art Corner by <a href="{{siteBaseUrl}}">Benjamin Lappalainen</a></span>
            <a href="{{siteBaseUrl}}/newsletter/">All posts</a>
        </footer>
    </div>
</body>
</html>
